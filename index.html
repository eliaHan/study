<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopwatch</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      background:
        radial-gradient(ellipse at 20% 20%, #7b5ea7 0%, transparent 55%),
        radial-gradient(ellipse at 80% 10%, #4a90d9 0%, transparent 50%),
        radial-gradient(ellipse at 60% 85%, #d96b8a 0%, transparent 50%),
        radial-gradient(ellipse at 10% 80%, #3abf8f 0%, transparent 50%),
        #1a1a2e;
      background-attachment: fixed;
    }

    /* 배경 blur 원형 장식 */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
    }
    body::before {
      width: 400px; height: 400px;
      background: #9b59b6;
      top: -100px; left: -100px;
    }
    body::after {
      width: 500px; height: 500px;
      background: #3498db;
      bottom: -150px; right: -100px;
    }

    /* 글라스 카드 */
    .card {
      position: relative;
      width: min(420px, 92vw);
      padding: 44px 36px 36px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        0 8px 40px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    /* 디스플레이 */
    .display-wrap {
      width: 100%;
      padding: 28px 16px 24px;
      border-radius: 20px;
      text-align: center;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: inset 0 2px 12px rgba(0, 0, 0, 0.2);
    }

    .time {
      display: flex;
      align-items: baseline;
      justify-content: center;
      /* 숫자 너비 고정 — 흔들림 방지 */
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      font-size: clamp(3.4rem, 13vw, 5.8rem);
      font-weight: 200;
      letter-spacing: 4px;
      color: #ffffff;
      line-height: 1;
    }

    .milliseconds {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: rgba(255, 255, 255, 0.5);
      font-weight: 200;
      letter-spacing: 2px;
      /* ms 너비도 고정 */
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      width: 3.2ch;
      text-align: left;
    }

    .label {
      margin-top: 12px;
      font-size: 0.65rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
    }

    /* 버튼 영역 */
    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
      transition: all 0.15s ease;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.95);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .btn:active {
      transform: scale(0.94);
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-sm {
      width: 60px;
      height: 60px;
    }

    #btn-start {
      width: 80px;
      height: 80px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #ffffff;
      background: rgba(108, 142, 255, 0.35);
      border-color: rgba(108, 142, 255, 0.5);
      box-shadow:
        0 6px 24px rgba(108, 142, 255, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    #btn-start:hover {
      background: rgba(108, 142, 255, 0.5);
      box-shadow:
        0 8px 30px rgba(108, 142, 255, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    #btn-start.running {
      background: rgba(255, 100, 120, 0.35);
      border-color: rgba(255, 100, 120, 0.5);
      box-shadow:
        0 6px 24px rgba(255, 100, 120, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    #btn-start.running:hover {
      background: rgba(255, 100, 120, 0.5);
      box-shadow:
        0 8px 30px rgba(255, 100, 120, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    .btn.inactive {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }

    /* 랩 목록 */
    .laps {
      width: 100%;
      max-height: 190px;
      overflow-y: auto;
    }

    .laps::-webkit-scrollbar { width: 2px; }
    .laps::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
    }

    .lap-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 2px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 0.83rem;
      color: rgba(255,255,255,0.5);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      animation: fadeIn 0.15s ease;
    }

    .lap-item:first-child {
      color: rgba(255,255,255,0.85);
    }

    .lap-num {
      font-size: 0.68rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    .lap-item:first-child .lap-num {
      color: rgba(255,255,255,0.45);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="display-wrap">
      <div class="time">
        <span id="display-time">00:00</span><span class="milliseconds" id="display-ms">.00</span>
      </div>
      <div class="label">Stopwatch</div>
    </div>

    <div class="controls">
      <button class="btn btn-sm inactive" id="btn-lap">LAP</button>
      <button class="btn" id="btn-start">START</button>
      <button class="btn btn-sm inactive" id="btn-reset">RST</button>
    </div>

    <div class="laps" id="laps"></div>

  </div>

  <script>
    let startTime = 0;
    let elapsed  = 0;
    let timer    = null;
    let running  = false;
    let lapCount = 0;
    let lapStart = 0;

    const displayTime = document.getElementById('display-time');
    const displayMs   = document.getElementById('display-ms');
    const btnStart    = document.getElementById('btn-start');
    const btnLap      = document.getElementById('btn-lap');
    const btnReset    = document.getElementById('btn-reset');
    const lapsEl      = document.getElementById('laps');

    function format(ms) {
      const totalSec = Math.floor(ms / 1000);
      const min = Math.floor(totalSec / 60).toString().padStart(2, '0');
      const sec = (totalSec % 60).toString().padStart(2, '0');
      const cs  = Math.floor((ms % 1000) / 10).toString().padStart(2, '0');
      return { main: `${min}:${sec}`, ms: `.${cs}` };
    }

    function tick() {
      elapsed = Date.now() - startTime;
      const { main, ms } = format(elapsed);
      displayTime.textContent = main;
      displayMs.textContent   = ms;
    }

    btnStart.addEventListener('click', () => {
      if (!running) {
        startTime = Date.now() - elapsed;
        if (lapStart === 0) lapStart = startTime;
        timer   = setInterval(tick, 10);
        running = true;
        btnStart.textContent = 'STOP';
        btnStart.classList.add('running');
        btnLap.classList.remove('inactive');
        btnReset.classList.remove('inactive');
      } else {
        clearInterval(timer);
        running = false;
        btnStart.textContent = 'START';
        btnStart.classList.remove('running');
        btnLap.classList.add('inactive');
      }
    });

    btnLap.addEventListener('click', () => {
      if (!running) return;
      lapCount++;
      const lapElapsed = Date.now() - lapStart;
      lapStart = Date.now();
      const { main, ms } = format(lapElapsed);
      const item = document.createElement('div');
      item.className = 'lap-item';
      item.innerHTML = `<span class="lap-num">Lap ${lapCount}</span><span>${main}${ms}</span>`;
      lapsEl.prepend(item);
    });

    btnReset.addEventListener('click', () => {
      if (running) return;
      elapsed  = 0;
      lapCount = 0;
      lapStart = 0;
      displayTime.textContent = '00:00';
      displayMs.textContent   = '.00';
      btnReset.classList.add('inactive');
      lapsEl.innerHTML = '';
    });
  </script>

</body>
</html>
